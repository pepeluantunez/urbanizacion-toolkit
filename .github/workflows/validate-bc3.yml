name: Validate BC3

on:
  pull_request:
    paths:
      - 'tools/bc3/**/*.ps1'
      - 'tools/python/**/*.py'
      - 'tests/test_bc3_tools.py'
      - 'tests/fixtures/minimal.bc3'
      - 'tests/fixtures/bc3/**'

jobs:
  bc3-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pytest
        shell: pwsh
        run: python -m pip install pytest
      - name: Smoke test BC3 validators
        shell: pwsh
        run: |
          if (-not (Test-Path .\tests\fixtures\bc3\sample-valid.bc3)) { throw "Missing sample-valid.bc3" }
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\bc3\check_bc3_integrity.ps1 -Paths .\tests\fixtures\bc3\sample-valid.bc3
      - name: Smoke test Python bc3_tools
        shell: pwsh
        run: |
          if (-not (Test-Path .\tests\fixtures\minimal.bc3)) { throw "Missing minimal.bc3" }
          python -m pytest .\tests\test_bc3_tools.py -q
