name: Validate Office

on:
  pull_request:
    paths:
      - 'tools/office/**/*.ps1'
      - 'tests/fixtures/generate-office-fixtures.ps1'
      - 'tests/fixtures/office/**'

jobs:
  office-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test Office validators
        shell: pwsh
        run: |
          & .\tests\fixtures\generate-office-fixtures.ps1
          if (-not (Test-Path .\tests\fixtures\office\sample-valid.docx)) { throw "Missing sample-valid.docx" }
          if (-not (Test-Path .\tests\fixtures\office\sample-valid.xlsx)) { throw "Missing sample-valid.xlsx" }
          & .\tools\office\check_office_mojibake.ps1 -Paths @('.\tests\fixtures\office\sample-valid.docx', '.\tests\fixtures\office\sample-valid.xlsx')
          & .\tools\office\check_docx_tables_consistency.ps1 -Paths @('.\tests\fixtures\office\sample-valid.docx')
          & .\tools\office\check_excel_formula_guard.ps1 -Paths @('.\tests\fixtures\office\sample-valid.xlsx')
