name: Validate Traceability

on:
  pull_request:
    paths:
      - 'tools/traceability/**/*.ps1'
      - 'tests/fixtures/traceability/**'

jobs:
  traceability-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test traceability validators
        shell: pwsh
        run: |
          if (-not (Test-Path .\tests\fixtures\traceability\budget.bc3)) { throw "Missing budget.bc3" }
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\traceability\check_traceability_consistency.ps1 -Paths .\tests\fixtures\traceability -Needles TKT-1.01
