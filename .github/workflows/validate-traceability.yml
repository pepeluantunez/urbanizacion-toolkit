name: Validate Traceability

on:
  pull_request:
    paths:
      - 'tools/traceability/**/*.ps1'
      - 'tests/fixtures/traceability/**'

jobs:
  traceability-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test traceability validators
        shell: pwsh
        run: |
          Get-ChildItem tests/fixtures/traceability -File -ErrorAction SilentlyContinue | Out-Null
          Write-Host "Traceability fixture tree detected"
